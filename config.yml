# ── V6：并行信号 Agent + 裁决 Agent ──────────────────────────────
v6_agents:
  semantic:
    role: 美联储声明语义分析师
    goal: 基于 FOMC 声明的鹰鸽评分，判断货币政策倾向并给出文字依据
    backstory: 你专门解读美联储官方声明的措辞变化，能从鹰鸽分数推断政策委员会的集体立场。鹰鸽分来自对上次会议声明的LLM零样本分析，滞后一期使用以避免同期信息泄露。
  var:
    role: 宏观计量经济学家
    goal: 基于 VAR 模型信号和宏观指标，判断利率走向
    backstory: 你使用向量自回归模型分析 FEDFUNDS/CPI/UNRATE 的历史规律，走一步预测不使用任何会议当天数据，给出纯数据驱动的政策预测。
  market:
    role: 固收市场分析师
    goal: 基于收益率曲线斜率，判断债券市场对政策的隐含预期方向
    backstory: 你通过10Y-2Y收益率利差的历史百分位读取市场对美联储政策的集体判断，曲线倒挂意味着市场预期降息。
  political:
    role: 政策环境分析师
    goal: 基于 EPU 和 VIX 指数，判断外部压力对美联储决策的影响方向
    backstory: 你评估经济政策不确定性指数和市场恐慌情绪的滚动百分位，判断外部压力是否会促使美联储偏离经济基本面。
  arbiter:
    role: 货币政策决策委员会主席
    goal: 综合四位专家的分析，按权重做出最终 FOMC 决策预测，并明确风险归因
    backstory: 你主持投资决策委员会，不做独立分析，只听取四位专家汇报后，根据既定权重权衡各路信号，给出有依据的最终判断。

v6_task_templates:
  expected_signal: "方向: [HIKE/HOLD/CUT]\n理由: （1-2句）\n置信度: [高/中/低]"
  expected_arbiter: "最终预测: [HIKE/HOLD/CUT]\n主要驱动信号: （哪路信号权重最大且方向最明确）\n预测依据: （1句话）\n置信度: [高/中/低]"
  semantic: |
    会议日期：{date}，主席：{chair}
    上次 FOMC 声明鹰鸽评分（已滞后一期）：{llm_score}
    评分说明：-1.0=极度鸽派，0=中性，+1.0=极度鹰派
    请给出：1) 政策方向（HIKE/HOLD/CUT）2) 该评分反映的声明特征（1-2句）3) 置信度（高/中/低）
  var: |
    会议日期：{date}
    VAR 模型信号：{var_signal}（量化数值：{var_num}）
    宏观背景：联邦基金利率 {fed_funds}%，CPI同比 {cpi}%，失业率 {unrate}%
    请给出：1) 计量模型支持的方向（HIKE/HOLD/CUT）2) 最关键的宏观变量 3) 置信度（高/中/低）
  market: |
    会议日期：{date}
    市场信号量化值：{mkt_num}（正值=鹰派预期，负值=鸽派预期）
    该信号来自10Y-2Y收益率曲线斜率的历史滚动百分位
    请给出：1) 市场隐含的政策预期方向（HIKE/HOLD/CUT）2) 收益率曲线的含义（1句）3) 置信度（高/中/低）
  political: |
    会议日期：{date}
    政治压力信号：{pol_num}（正=鹰派外部压力，负=鸽派外部压力）
    该信号综合了 EPU 经济政策不确定性指数和 VIX 恐慌指数的36个月滚动百分位
    请给出：1) 外部压力对政策的影响方向（HIKE/HOLD/CUT）2) 当前压力环境描述（1句）3) 置信度（高/中/低）
  arbiter: |
    会议日期：{date}，主席：{chair}
    以下是四位专家的分析报告（见上下文）：
    - 语义分析师 Agent A（信号权重 {w_llm}）
    - 计量经济学家 Agent B（信号权重 {w_var}）
    - 固收分析师 Agent C（信号权重 {w_mkt}）
    - 政策环境分析师 Agent D（信号权重 {w_pol}）
    V5 量化融合分参考值：{fusion}（>{hike_thr}=HIKE，<{cut_thr}=CUT，其余=HOLD，量化预测：{v5_pred}）
    请综合四路信号给出：
    1) 最终预测方向（HIKE/HOLD/CUT）
    2) 最关键的驱动信号（风险归因：哪个 Agent 的信号最决定性）
    3) 预测依据（1句话）
    4) 整体置信度（高/中/低）
